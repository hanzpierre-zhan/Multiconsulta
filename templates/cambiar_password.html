{% extends "base.html" %}

{% block content %}
<div class="glass" style="width: 100%; max-width: 400px; padding: 40px; text-align: center; border-top: 4px solid var(--primary); margin: 0 auto;">
    <div style="margin-bottom: 32px;">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 48px; height: 48px;">
        <h2 style="margin: 16px 0 8px 0; color: var(--primary);">Cambiar Contraseña</h2>
        <p style="margin: 0; color: var(--text-muted); font-size: 14px;">Ingresa tus datos para actualizar tu clave</p>
    </div>

    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 6px; margin-bottom: 24px; font-size: 14px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/cambiar_password" style="text-align: left;">
        <div class="form-group" style="margin-bottom: 16px;">
            <label>Usuario</label>
            <input type="text" name="username" required placeholder="Tu nombre de usuario" autofocus>
        </div>
        <div class="form-group" style="margin-bottom: 16px;">
            <label>Contraseña Actual</label>
            <input type="password" name="old_password" required placeholder="••••••••">
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
            <label>Nueva Contraseña</label>
            <input type="password" name="new_password" required placeholder="Mínimo 6 caracteres">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; justify-content: center; font-size: 16px; padding: 12px; margin-bottom: 16px;">
            Actualizar <i data-lucide="check" style="width:18px;height:18px;"></i>
        </button>
        <div style="text-align: center;">
            <a href="/login" style="color: var(--primary); font-size: 14px; text-decoration: none;">Volver al Login</a>
        </div>
    </form>
</div>
{% endblock %}
